<!DOCTYPE html>
<html>
<head>
  <title>Smart Plug Remote</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

<h2>Smart Plug (Remote)</h2>

<button id="toggleBtn" onclick="togglePlug()">OFF</button>

<h3>Current: <span id="current">0</span></h3>
<h3>Power: <span id="power">0</span></h3>
<h3>Energy: <span id="energy">0</span></h3>
<h3>Plug Status: <span id="status">Unknown</span></h3>

<script>

// 🔐 HiveMQ WebSocket URL
const client = mqtt.connect(
  "wss://0e66730e789d474d957d8738cc74ac60.s1.eu.hivemq.cloud:8884/mqtt",
  {
    username: "Wirelessplug_iiti1",
    password: "Wirelessplug_iiti1"
  }
);

client.on("connect", () => {
  console.log("Connected to MQTT");

  client.subscribe("smartplug/data");
  client.subscribe("smartplug/status");
  client.subscribe("smartplug/fault");
  client.subscribe("smartplug/relay");
});

let lastUpdate = Date.now();
let isOn = false;
let fault = false;

client.on("message", (topic, message) => {

  if (topic === "smartplug/data") {
    lastUpdate = Date.now();

    let data = JSON.parse(message.toString());

    document.getElementById("current").innerText = data.current.toFixed(2);
    document.getElementById("power").innerText = data.power.toFixed(2);
    document.getElementById("energy").innerText = data.energy.toFixed(3);
  }

  if (topic === "smartplug/status") {
    document.getElementById("status").innerText = message.toString();
  }

 if (topic === "smartplug/fault") {
  document.getElementById("status").innerText = "Overcurrent Trip";
  fault = true;
  isOn = false;
  updateButton();
}
  
  if (topic === "smartplug/relay") {
  isOn = message.toString() === "1";
  updateButton();
}
});

// ⏱️ watchdog
setInterval(() => {
  if (Date.now() - lastUpdate > 5000) {
    document.getElementById("status").innerText = "offline";
  }
}, 1000);
  
// 🔘 Control functions
function togglePlug() {

  if (fault) {
    alert("Fault active! Reset from device.");
    return;
  }

  if (isOn) {
    client.publish("smartplug/control", "0");
  } else {
    client.publish("smartplug/control", "1");
  }
}

function updateButton() {
  document.getElementById("toggleBtn").innerText = isOn ? "ON" : "OFF";
}

</script>

</body>
</html>
